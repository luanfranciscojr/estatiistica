name: Deploy Backend Integra

on:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/estatistica-api
  CONTAINER_NAME: estatistica-api

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/api/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

  update-server:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Configure SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy container on server
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          APP_ORIGIN: ${{ secrets.APP_ORIGIN }}
          NIB_BASE_URL: ${{ secrets.NIB_BASE_URL }}
          NIB_MATRICULA: ${{ secrets.NIB_MATRICULA }}
          NIB_SENHA: ${{ secrets.NIB_SENHA }}
          NIB_MOCK: ${{ secrets.NIB_MOCK }}
          SESSION_COOKIE_NAME: ${{ secrets.SESSION_COOKIE_NAME }}
          SESSION_TTL_HOURS: ${{ secrets.SESSION_TTL_HOURS }}
        run: |
          ssh -i ~/.ssh/deploy_key "${SSH_USER}@${SSH_HOST}" <<EOF
            set -e
            sudo docker login ${REGISTRY} -u ${GHCR_USERNAME} -p ${GHCR_TOKEN}
            sudo docker pull ${IMAGE_NAME}:latest
            sudo docker stop ${CONTAINER_NAME} || true
            sudo docker rm ${CONTAINER_NAME} || true
            sudo docker run -d \
              --name ${CONTAINER_NAME} \
              --restart unless-stopped \
              -p 3001:3001 \
              -e PORT=3001 \
              -e DATABASE_URL="${DATABASE_URL}" \
              -e APP_ORIGIN="${APP_ORIGIN}" \
              -e NIB_BASE_URL="${NIB_BASE_URL}" \
              -e NIB_MATRICULA="${NIB_MATRICULA}" \
              -e NIB_SENHA="${NIB_SENHA}" \
              -e NIB_MOCK="${NIB_MOCK}" \
              -e SESSION_COOKIE_NAME="${SESSION_COOKIE_NAME}" \
              -e SESSION_TTL_HOURS="${SESSION_TTL_HOURS}" \
              ${IMAGE_NAME}:latest
          EOF
